<!DOCTYPE html>
<html>
<head>
<title>AI Smart Travel Planner</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🌍 AI Smart Travel Planner</h1>
<p>Plan your perfect trip instantly</p>

<div class="form">

<select id="destination">

<option value="paris">Paris, France</option>
<option value="tokyo">Tokyo, Japan</option>
<option value="rome">Rome, Italy</option>
<option value="london">London, UK</option>
<option value="newyork">New York, USA</option>
<option value="dubai">Dubai, UAE</option>
<option value="sydney">Sydney, Australia</option>
<option value="delhi">Delhi, India</option>
<option value="bangkok">Bangkok, Thailand</option>
<option value="singapore">Singapore</option>

</select>

<input id="days" type="number" placeholder="Number of Days">

<select id="budget">
<option value="budget">Budget</option>
<option value="mid">Mid Range</option>
<option value="luxury">Luxury</option>
</select>

<button onclick="planTrip()">Plan My Trip</button>

</div>

<h2>Your Itinerary</h2>
<div id="itinerary"></div>

<h2>Location Map</h2>
<iframe id="map" width="400" height="300" style="border:0"></iframe>

<h2>Estimated Budget</h2>
<p id="budgetResult"></p>

<h2>Packing List</h2>
<ul id="packing"></ul>

<script src="script.js"></script>

</body>
</html>
